<script>
// ── Inline web app manifest ──────────────────────────────────────────────────
(function(){
  // Build SVG icon as a data URI
  const svg512 = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="90" fill="#1b1915"/>
    <text x="256" y="358" font-family="Georgia,serif" font-size="300" font-weight="600"
      fill="#f4efe6" text-anchor="middle">C</text>
    <circle cx="380" cy="148" r="28" fill="#a0432a"/>
  </svg>`;
  const iconUrl = 'data:image/svg+xml;base64,' + btoa(svg512);

  const manifest = {
    name: "Clarity · Daily Journal",
    short_name: "Clarity",
    description: "A CBT-guided daily journal",
    start_url: "./",
    display: "standalone",
    background_color: "#f4efe6",
    theme_color: "#1b1915",
    orientation: "portrait",
    icons: [
      { src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
      { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel   = 'manifest';
  link.href  = url;
  document.head.appendChild(link);

  // Apple touch icon
  const appleLink = document.createElement('link');
  appleLink.rel  = 'apple-touch-icon';
  appleLink.href = iconUrl;
  document.head.appendChild(appleLink);
})();

// ── Service Worker (minimal — enables install prompt) ─────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'clarity-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      // Cache-first for same-origin, network for everything else
      if (e.request.url.startsWith(self.location.origin)) {
        e.respondWith(
          caches.open(CACHE).then(cache =>
            cache.match(e.request).then(cached =>
              cached || fetch(e.request).then(resp => {
                cache.put(e.request, resp.clone());
                return resp;
              })
            )
          )
        );
      }
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>

const { useState, useEffect, useCallback, useRef } = React;

// ── Data ─────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'clarity-journal-v1';

const MOODS = [

const TAGS = [
  { id:"work",         label:"Work",         icon:"💼" },
  { id:"family",       label:"Family",       icon:"🏠" },
  { id:"relationship", label:"Relationship", icon:"💛" },
  { id:"social",       label:"Social",       icon:"👥" },
  { id:"health",       label:"Health",       icon:"🩺" },
  { id:"parenting",    label:"Parenting",    icon:"🍼" },
  { id:"finances",     label:"Finances",     icon:"💰" },
  { id:"busy",         label:"Busy",         icon:"⚡" },
  { id:"rest",         label:"Rest Day",     icon:"☁️" },
  { id:"exercise",     label:"Exercise",     icon:"🏃" },
  { id:"sleep",        label:"Poor Sleep",   icon:"🌙" },
  { id:"travel",       label:"Travel",       icon:"✈️" },
];

const DISTORTIONS = [
  { id:"catastrophizing",    label:"Catastrophizing",        desc:"Expecting the worst",
    detail:"You fast-forward to the worst possible outcome and treat it as likely. CBT asks you to reality-test the probability chain. What's the actual likelihood of the worst case? What's more likely? What would you tell a friend who had this same thought? The goal isn't toxic positivity — it's accurate probability. \"This could go badly\" is honest. \"This will definitely ruin everything\" is a story you're telling yourself." },
  { id:"allOrNothing",       label:"All-or-Nothing",         desc:"No middle ground",
    detail:"Extremes with no middle ground — perfect or failure, always or never. CBT pushes you to find the grey. Rate things on a scale instead of a binary. If 100% is perfect and 0% is total failure, where does this actually land? Usually somewhere in the 60–75% range, which is just... normal human performance. The intervention is deliberately introducing gradations into your language and evaluation." },
  { id:"mindReading",        label:"Mind Reading",           desc:"Assuming others' thoughts",
    detail:"Assuming you know what others think, usually negatively, without checking. CBT's move here is behavioural — go get actual data. Ask the person. Check your assumption against evidence. And when you can't, CBT asks you to list alternative explanations for their behaviour. Your friend was quiet at dinner — they could be tired, stressed, distracted, or just introverted that night. Your assumption is one of many possibilities, not the truth." },
  { id:"overgeneralization", label:"Overgeneralization",     desc:"Always / never thinking",
    detail:"One event becomes a universal law. CBT challenges the language directly. When you find yourself saying always or never, you're asked to find the exception — because there almost always is one. \"I always mess this up\" gets examined: every single time? Really? Finding even one counter-example breaks the generalization. Keeping a log of evidence for and against the belief over time is a common tool here." },
  { id:"personalization",    label:"Personalization",        desc:"Taking undue blame",
    detail:"Assigning yourself as the cause of things outside your control. CBT uses what's called a responsibility pie. You list every factor that contributed to the outcome, assign each a rough percentage, and add yourself last. Usually you find your actual share is smaller than it felt. It also asks: what would it mean if you weren't responsible? Sometimes personalization is a way of feeling in control — if it's your fault, you could have prevented it, which is less scary than randomness." },
  { id:"filtering",          label:"Mental Filter",          desc:"Fixating on negatives",
    detail:"Fixating on one negative while ignoring everything else. CBT asks you to deliberately record the full picture. Not to dismiss the negative, but to add back what you filtered out. A thought record for this one looks like: what are all the facts of this situation, not just the ones that support the negative view? It also asks why that one piece of criticism stuck — sometimes it hooks onto a deeper core belief worth examining." },
  { id:"shouldStatements",   label:"Should Statements",      desc:"Rigid internal rules",
    detail:"Rigid internal rules creating guilt, shame, or resentment. CBT asks you to audit the rule itself. Where did it come from? Is it realistic? Would you apply it to someone you care about? The reframe is usually shifting \"should\" to \"it would be helpful if\" or \"I'd prefer if\" — language that acknowledges the preference without the moral weight. It also surfaces whose rule it actually is. A lot of shoulds turn out to belong to a parent, a culture, or a past version of circumstances that no longer apply." },
  { id:"emotionalReasoning", label:"Emotional Reasoning",    desc:"Feelings as facts",
    detail:"Feelings as proof of reality. CBT draws a hard line here: emotions are data about your internal state, not evidence about external reality. The technique is to explicitly separate the feeling from the fact. \"I feel like a burden\" goes on one side. \"Evidence that I am actually a burden\" goes on the other. Usually the evidence side is thin. The feeling is real — CBT never dismisses that — but it's treated as a symptom to understand, not a truth to accept." },
  { id:"jumping",            label:"Jumping to Conclusions", desc:"Conclusions without evidence",
    detail:"Firm conclusions without evidence. CBT asks: what would I need to actually know before I could draw this conclusion? It slows the process down and exposes the gap between what you observed and what you decided it meant. Then it asks for alternative interpretations — not more optimistic ones necessarily, just other plausible explanations for the same facts. The goal is to hold the conclusion loosely until there's real evidence." },
  { id:"magnification",      label:"Magnification",          desc:"Blowing things out of proportion",
    detail:"Inflating the size or significance of something. CBT uses a technique called decatastrophizing — putting the event on a scale of 0 to 100 where 100 is the worst thing you can imagine. Most things, when placed honestly on that scale, land much lower than they felt. It also uses a time perspective question: how much will this matter in a week? A month? A year? This isn't dismissive — it's a genuine recalibration of proportion that the emotion was distorting." },
];

// ── Helpers ───────────────────────────────────────────────────────────────────

const toKey    = d => d.toISOString().slice(0,10);
const todayObj = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const parseKey = k => { const [y,m,d] = k.split('-').map(Number); return new Date(y,m-1,d); };

const friendlyDate = key => {
  const tk = toKey(todayObj());
  if (key === tk) return 'Today';
  const yObj = new Date(todayObj()); yObj.setDate(yObj.getDate()-1);
  if (key === toKey(yObj)) return 'Yesterday';
  return parseKey(key).toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
};

const formatLong = key =>
  parseKey(key).toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

const blank = key => ({ date:key, mood:null, tags:[], distortions:[], comment:'', savedAt:null });

.btn-install{
  background:var(--rust);color:#fff;border:none;border-radius:8px;
  padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;flex-shrink:0;white-space:nowrap;-webkit-tap-highlight-color:transparent;
}
.btn-dismiss{
  background:none;border:none;color:rgba(244,239,230,.4);font-size:18px;
  cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
`;

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [entries,    setEntries]    = useState({});
  const [activeKey,  setActiveKey]  = useState(null);
  const [showPicker, setShowPicker] = useState(false);
  const [pickerVal,  setPickerVal]  = useState(toKey(todayObj()));
  const [form,       setForm]       = useState(null);
  const [saved,      setSaved]      = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [showBanner, setShowBanner] = useState(false);
  const [distDetail, setDistDetail] = useState(null);
  const lpTimer = useRef(null);
  const lpSuppressClick = useRef(false);

  const lpStart = (id) => {
    lpTimer.current = setTimeout(() => {
      lpSuppressClick.current = true;
      setDistDetail(id);
    }, 500);
  };
  const lpCancel = () => clearTimeout(lpTimer.current);

  const exportCSV = () => {
    const header = ['Date','Mood Value','Mood Label','Tags','Distortions','Notes','Saved At'];
    const escape = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
    const rows = Object.keys(entries).sort().map(key => {
      const e = entries[key];
      const mood = MOODS.find(m => m.value === e.mood);
      const tagLabels = e.tags.map(id => TAGS.find(t => t.id === id)?.label || id).join('; ');
      const distLabels = e.distortions.map(id => DISTORTIONS.find(d => d.id === id)?.label || id).join('; ');
      return [e.date, e.mood ?? '', mood?.label ?? '', tagLabels, distLabels, e.comment, e.savedAt ?? '']
        .map(escape).join(',');
    });
    const csv = [header.map(escape).join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clarity-journal-${toKey(new Date())}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Load from localStorage
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setEntries(JSON.parse(raw));
    } catch {}
  }, []);

  // Capture install prompt
  useEffect(() => {
    const handler = e => {
      e.preventDefault();
      setDeferredPrompt(e);
      setShowBanner(true);
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const persist = useCallback((updated) => {
    setEntries(updated);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); } catch {}
  }, []);

  const openEntry = (key) => {
    setForm({ ...(entries[key] || blank(key)) });
    setActiveKey(key);
    setSaved(false);
  };

  const saveEntry = () => {
    const updated = { ...entries, [form.date]: { ...form, savedAt: new Date().toISOString() } };
    persist(updated);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const deleteEntry = (key) => {
    const updated = { ...entries };
    delete updated[key];
    persist(updated);
    setActiveKey(null);
    setForm(null);
  };

  const toggle = (field, id) => {
    setForm(f => ({
      ...f,
      [field]: f[field].includes(id) ? f[field].filter(x => x !== id) : [...f[field], id],
    }));
    setSaved(false);
  };

  const handleInstall = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    setDeferredPrompt(null);
    setShowBanner(false);
  };

  const todayKey   = toKey(todayObj());
  const todayEntry = entries[todayKey];
  const todayMood  = todayEntry?.mood != null ? MOODS.find(m => m.value === todayEntry.mood) : null;
  const sortedKeys = Object.keys(entries).sort((a,b) => b.localeCompare(a));

  // Friendly day label for entry view
  const dayLabel = activeKey => {
    if (activeKey === todayKey) return 'Today';
    const y = new Date(todayObj()); y.setDate(y.getDate()-1);
    if (activeKey === toKey(y)) return 'Yesterday';
    return 'Past entry';
  };

  return (
    <>
      <style>{STYLE}</style>
      <div className="app">

        {/* Install banner */}
        {showBanner && (
          <div className="install-banner">
            <div className="install-banner-text">
              <strong>Add Clarity to your home screen</strong> for quick access anytime.
            </div>
            <button className="btn-install" onClick={handleInstall}>Install</button>
            <button className="btn-dismiss" onClick={() => setShowBanner(false)}>×</button>
          </div>
        )}

        {/* Header */}
        <header className="hdr">
          <div className="hdr-logo">Clarity</div>
          <div className="hdr-dot" />
          <div className="hdr-sub">Daily Journal</div>
          <div className="hdr-spacer" />
          {activeKey ? (
            <button className="hdr-btn" onClick={() => { setActiveKey(null); setForm(null); }}>
              ← All entries
            </button>
          ) : (
            <>
              {Object.keys(entries).length > 0 && (
                <button className="hdr-btn" onClick={exportCSV} style={{marginRight:6}}>
                  ↓ CSV
                </button>
              )}
              <button className="hdr-btn" onClick={() => { setPickerVal(toKey(todayObj())); setShowPicker(true); }}>
                📅 Past day
              </button>
            </>
          )}
        </header>

        {/* Date picker sheet */}
        {showPicker && (
          <div className="overlay" onClick={() => setShowPicker(false)}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <div className="modal-handle" />
              <div className="modal-title">Choose a date</div>
              <input type="date" className="date-inp"
                value={pickerVal} max={toKey(todayObj())}
                onChange={e => setPickerVal(e.target.value)} />
              <div className="modal-btns">
                <button className="btn-cancel" onClick={() => setShowPicker(false)}>Cancel</button>
                <button className="btn-go" onClick={() => { setShowPicker(false); openEntry(pickerVal); }}>
                  Open →
                </button>
              </div>
            </div>
          </div>
        )}

        <div className="scroll-body">

          {/* ── Home ── */}
          {!activeKey && (
            <div className="home">
              <div className="today-card" onClick={() => openEntry(todayKey)}>
                <div className="tc-label">{todayMood ? "Today's entry" : "Start today's entry"}</div>
                <div className="tc-weekday">
                  {todayObj().toLocaleDateString('en-CA', { weekday:'long' })}
                </div>
                <div className="tc-datestr">
                  {todayObj().toLocaleDateString('en-CA', { month:'long', day:'numeric', year:'numeric' })}
                </div>
                {todayMood ? (
                  <div className="tc-mood">
                    <span className="tc-mood-emoji">{todayMood.emoji}</span>
                    <span className="tc-mood-text">
                      {todayMood.label}
                      {todayEntry.tags.length > 0
                        ? ' · ' + todayEntry.tags.map(id => TAGS.find(t => t.id === id)?.icon).join(' ')
                        : ''}
                    </span>
                  </div>
                ) : (
                  <div className="tc-mood">
                    <span className="tc-mood-text" style={{fontStyle:'italic'}}>How was your day?</span>
                  </div>
                )}
                <div className="tc-arrow">→</div>
              </div>

              <div className="sec-label">Past entries</div>

              {sortedKeys.filter(k => k !== todayKey).length === 0 ? (
                <div className="empty">
                  <div className="empty-icon">📖</div>
                  <div className="empty-text">Past entries will appear here.<br />Use "Past day" to backfill any date.</div>
                </div>
              ) : (
                <div className="timeline">
                  {sortedKeys.filter(k => k !== todayKey).map(key => {
                    const e    = entries[key];
                    const mood = MOODS.find(m => m.value === e.mood);
                    return (
                      <div key={key} className="tl-item" onClick={() => openEntry(key)}>
                        <div className="tl-badge" style={{ background: mood?.bg || 'var(--cream)' }}>
                          {mood?.emoji || '—'}
                        </div>
                        <div className="tl-body">
                          <div className="tl-date">{friendlyDate(key)}</div>
                          <div className="tl-label">{mood?.label || 'No mood logged'}</div>
                          {e.comment ? <div className="tl-comment">{e.comment}</div> : null}
                          {e.tags.length > 0 && (
                            <div className="tl-tags">
                              {e.tags.map(id => {
                                const t = TAGS.find(x => x.id === id);
                                return <span key={id} className="tl-tag">{t?.icon} {t?.label}</span>;
                              })}
                            </div>
                          )}
                        </div>
                        <div className="tl-arrow">›</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ── Entry ── */}
          {activeKey && form && (
            <div className="entry-wrap">
              <div className="entry-date-row">
                <div className="entry-label">{dayLabel(activeKey)}</div>
                <div className="entry-date">{formatLong(activeKey)}</div>
              </div>

              {/* Mood */}
              <div className="block">
                <div className="block-label">Overall day — 1 unbearable · 5 thriving</div>
                <div className="mood-row">
                  {MOODS.map(m => (
                    <button key={m.value}
                      className={`mood-btn${form.mood === m.value ? ' sel' : ''}`}
                      style={form.mood === m.value ? { borderColor:m.color, background:m.bg } : {}}
                      onClick={() => { setForm(f => ({ ...f, mood:m.value })); setSaved(false); }}>
                      <span className="mn" style={form.mood === m.value ? { color:m.color } : {}}>{m.value}</span>
                      <span className="me">{m.emoji}</span>
                      <span className="ml">{m.label}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Tags */}
              <div className="block">
                <div className="block-label">What shaped the day?</div>
                <div className="tags-wrap">
                  {TAGS.map(t => (
                    <button key={t.id}
                      className={`tag-btn${form.tags.includes(t.id) ? ' sel' : ''}`}
                      onClick={() => toggle('tags', t.id)}>
                      <span>{t.icon}</span><span>{t.label}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Distortions */}
              <div className="block">
                <div className="block-label">Any thinking traps today? · Hold for detail</div>
                <div className="dist-grid">
                  {DISTORTIONS.map(d => (
                    <button key={d.id}
                      className={`dist-btn${form.distortions.includes(d.id) ? ' sel' : ''}`}
                      onMouseDown={() => lpStart(d.id)}
                      onMouseUp={lpCancel}
                      onMouseLeave={lpCancel}
                      onTouchStart={() => lpStart(d.id)}
                      onTouchEnd={lpCancel}
                      onTouchMove={lpCancel}
                      onClick={() => {
                        if (lpSuppressClick.current) { lpSuppressClick.current = false; return; }
                        toggle('distortions', d.id);
                      }}>
                      <div className="dl">{d.label}</div>
                      <div className="dd">{d.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Comment */}
              <div className="block">
                <div className="block-label">Notes</div>
                <textarea className="comment"
                  placeholder="Anything worth capturing — what happened, what you noticed, what you'd tell yourself tomorrow…"
                  value={form.comment}
                  onChange={e => { setForm(f => ({ ...f, comment:e.target.value })); setSaved(false); }}
                  rows={5} />
              </div>
            </div>
          )}

        </div>{/* end scroll-body */}

        {/* Distortion detail overlay */}
        {distDetail && (() => {
          const d = DISTORTIONS.find(x => x.id === distDetail);
          return (
            <div className="overlay" onClick={() => setDistDetail(null)}>
              <div className="dist-detail-modal" onClick={e => e.stopPropagation()}>
                <div className="modal-handle" />
                <div className="dist-detail-tag">Thinking trap</div>
                <div className="dist-detail-title">{d.label}</div>
                <div className="dist-detail-body">{d.detail}</div>
                <button className="dist-detail-close" onClick={() => setDistDetail(null)}>Done</button>
              </div>
            </div>
          );
        })()}

        {/* Save bar (only in entry view) */}
        {activeKey && form && (
          <div className="save-bar">
            <div>
              {entries[activeKey] && (
                <button className="btn-del" onClick={() => deleteEntry(activeKey)}>Delete</button>
              )}
            </div>
            <div className="save-right">
              <span className={`save-status${saved ? ' ok' : ''}`}>
                {saved ? '✓ Saved' : form.mood != null ? 'Unsaved' : ''}
              </span>
              <button className="btn-save" onClick={saveEntry} disabled={form.mood == null}>
                Save day
              </button>
            </div>
          </div>
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
